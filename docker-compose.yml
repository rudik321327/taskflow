services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-taskflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskflow_secret}
      POSTGRES_DB: ${DB_NAME:-taskflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: taskflow_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  notification:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow_notification
    command: ["-mode=grpc"]
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow_api
    command: ["-mode=api"]
    env_file: .env
    environment:
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
      GRPC_NOTIFICATION_ADDR: notification:50051
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      notification:
        condition: service_started

volumes:
  pgdata:
